<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% if page.canonical %}<link rel="canonical" href="{{ page.canonical }}">{% else %}<link rel="canonical" href="{{ site.url }}{{ site.baseurl }}{{ page.url }}">{% endif %}

  <!-- Open Graph / Twitter Card -->
  <meta property="og:type" content="{{ page.og_type | default: 'article' }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  <meta name="twitter:image" content="{{ site.url }}{{ site.baseurl }}/og.png">
  <meta name="twitter:creator" content="@Battam1111">

  <!-- JSON-LD structured data, gated by page.schema front-matter -->
  {% if page.schema %}{% include schema/{{ page.schema }}.html %}{% endif %}

  <!-- Always include WebSite schema on every page -->
  {% include schema/website.html %}

  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ site.baseurl }}/feed.xml">
  <link rel="sitemap" type="application/xml" href="{{ site.baseurl }}/sitemap.xml">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.min.css">
  <style>
    body { max-width: 920px; margin: 0 auto; padding: 2rem 1.5rem; }
    h1, h2 { line-height: 1.2; }
    pre { overflow-x: auto; padding: 0.8rem; border-radius: 6px; }
    code { font-size: 0.92em; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { padding: 0.4rem 0.7rem; border-bottom: 1px solid #2a3645; }
    .footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #2a3645; color: #6c7891; font-size: 0.9em; }
    .sponsor { display: inline-block; padding: 0.3rem 0.8rem; background: #ea4aaa; color: white; border-radius: 6px; text-decoration: none; }
    .related-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 0.8rem; margin: 1rem 0; }
    .related-card { padding: 0.7rem 0.9rem; border: 1px solid #2a3645; border-radius: 6px; }
    .related-card a { text-decoration: none; font-weight: 600; }
    .related-card p { margin: 0.3rem 0 0 0; font-size: 0.88em; color: #8d99b0; }
  </style>
</head>
<body>
  {{ content }}

  <!-- Pagefind search UI (lazy-load) -->
  <link href="{{ site.baseurl }}/pagefind/pagefind-ui.css" rel="stylesheet">
  <script src="{{ site.baseurl }}/pagefind/pagefind-ui.js" defer></script>
  <div id="pagefind-search" style="max-width: 800px; margin: 1rem auto;"></div>
  <script>window.addEventListener('DOMContentLoaded', () => {
    if (window.PagefindUI) new PagefindUI({element: "#pagefind-search", showSubResults: true});
  });</script>

  {% include end-of-tutorial-cta.html %}

  {% include cross-repo-footer.html %}

  <div class="footer">
    <p>By <a href="https://github.com/Battam1111">Battam1111</a> ·
       <a class="sponsor" href="https://github.com/sponsors/Battam1111">♥ Sponsor</a> ·
       <a href="{{ site.baseurl }}/feed.xml">RSS</a> ·
       <a href="https://github.com/Battam1111/midnight-zk-cookbook">Repo</a></p>
  </div>
</body>
</html>
