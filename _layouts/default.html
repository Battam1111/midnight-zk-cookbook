<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title | default: site.title }} · Midnight ZK Cookbook</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Open Graph / Twitter Card -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:image" content="https://battam1111.github.io/midnight-zk-cookbook/og.png">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:image" content="https://battam1111.github.io/midnight-zk-cookbook/og.png">

  <link rel="alternate" type="application/rss+xml" title="Midnight ZK Cookbook" href="/midnight-zk-cookbook/feed.xml">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.min.css">
  <style>
    body { max-width: 920px; margin: 0 auto; padding: 2rem 1.5rem; }
    h1, h2 { line-height: 1.2; }
    pre { overflow-x: auto; padding: 0.8rem; border-radius: 6px; }
    code { font-size: 0.92em; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { padding: 0.4rem 0.7rem; border-bottom: 1px solid #2a3645; }
    .footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #2a3645; color: #6c7891; font-size: 0.9em; }
    .sponsor { display: inline-block; padding: 0.3rem 0.8rem; background: #ea4aaa; color: white; border-radius: 6px; text-decoration: none; }
  </style>
</head>
<body>
  {{ content }}
  <!-- Pagefind search UI -->
  <link href="/midnight-zk-cookbook/pagefind/pagefind-ui.css" rel="stylesheet">
  <script src="/midnight-zk-cookbook/pagefind/pagefind-ui.js"></script>
  <div id="pagefind-search" style="max-width: 800px; margin: 1rem auto;"></div>
  <script>window.addEventListener('DOMContentLoaded', () => {
    if (window.PagefindUI) new PagefindUI({element: "#pagefind-search", showSubResults: true});
  });</script>

  <div class="footer">
    <p>By <a href="https://github.com/Battam1111">Battam1111</a> ·
       <a class="sponsor" href="https://github.com/sponsors/Battam1111">♥ Sponsor</a> ·
       <a href="/midnight-zk-cookbook/feed.xml">RSS</a> ·
       <a href="https://github.com/Battam1111/midnight-zk-cookbook">Repo</a></p>
  </div>
</body>
</html>
